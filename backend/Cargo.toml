[package]
name = "backend"
version = "0.5.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.100"
axum = { version = "0.8.7", features = ["macros"] }
chrono = { version = "0.4.42", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio", "time", "chrono"] }
structopt = "0.3.26"
tokio = { version = "1.48.0", features = ["full"] }
tower = { version = "0.5.2", features = ["tracing", "load"] }
tower-http = { version = "0.6.8", features = ["trace", "full"] }
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22", features = ["json", "tracing"] }
metrics = "0.24.3"
metrics-exporter-prometheus = "0.18.1"
futures = "0.3.31"
moka = { version = "0.12.11", features = ["future"] }
