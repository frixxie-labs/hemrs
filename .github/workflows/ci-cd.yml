name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-plotter:
    name: Lint plotter
    runs-on: arc-services
    container:
      image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ruff
        run: |
          uv tool run ruff check plotter/
          uv tool run ruff format --check plotter/

  build-plotter:
    name: Build plotter
    needs: lint-plotter
    runs-on: arc-services
    container:
      image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync dependencies
        working-directory: plotter
        run: uv sync --frozen

  test-plotter:
    name: Test plotter
    needs: build-plotter
    runs-on: arc-services
    container:
      image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync dependencies
        working-directory: plotter
        run: uv sync --frozen

      - name: Run tests
        working-directory: plotter
        run: uv run pytest

  build-backend:
    name: Build backend
    runs-on: arc-services
    container:
      image: rust:latest
    env:
      SQLX_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust versions
        run: rustc --version && cargo --version

      - name: Build workspace
        run: cargo build --workspace --verbose

  test-backend:
    name: Test backend
    needs: build-backend
    runs-on: arc-services
    container:
      image: rust:latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SQLX_OFFLINE: "1"
      DATABASE_URL: postgresql://postgres:admin@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust versions
        run: rustc --version && cargo --version

      - name: Run tests
        run: cargo test --workspace --verbose

  lint-frontend:
    name: Lint frontend
    runs-on: arc-services
    container:
      image: denoland/deno:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        working-directory: frontend
        run: deno fmt --check .

      - name: Lint
        working-directory: frontend
        run: deno lint .

  build-frontend:
    name: Build frontend
    needs: lint-frontend
    runs-on: arc-services
    container:
      image: denoland/deno:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check frontend
        working-directory: frontend
        run: deno task check

      - name: Build frontend
        working-directory: frontend
        run: deno task build

  test-frontend:
    name: Test frontend
    needs: build-frontend
    runs-on: arc-services
    container:
      image: denoland/deno:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        working-directory: frontend
        run: deno task test

  deploy-backend:
    name: Deploy backend image
    needs:
      - test-backend
      - test-frontend
      - test-plotter
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: arc-buildah
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}

  deploy-plotter:
    name: Deploy plotter image
    needs:
      - test-backend
      - test-frontend
      - test-plotter
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: arc-buildah
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/plotter"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: plotter
          file: plotter/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}

  deploy-frontend:
    name: Deploy frontend image
    needs:
      - test-backend
      - test-frontend
      - test-plotter
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: arc-buildah
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/frontend"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          build-args: |
            GIT_REVISION=${{ github.sha }}
