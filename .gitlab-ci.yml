stages:
  - lint
  - build
  - test
  - deploy

# ── Plotter (Python) ─────────────────────────────────────────────

lint-plotter:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - uv tool run ruff check plotter/
    - uv tool run ruff format --check plotter/
  rules:
    - changes:
        - plotter/**/*

build-plotter:
  stage: build
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - cd plotter
    - uv sync --frozen
  rules:
    - changes:
        - plotter/**/*

test-plotter:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - cd plotter
    - uv sync --frozen
    - uv run pytest
  rules:
    - changes:
        - plotter/**/*

deploy-plotter:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --tag "${CI_REGISTRY_IMAGE}/plotter:${CI_COMMIT_TAG}"
      -f plotter/Dockerfile plotter/
    - buildah push "${CI_REGISTRY_IMAGE}/plotter:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

# ── Backend (Rust) ────────────────────────────────────────────────

build-backend:
  stage: build
  image: "rust:latest"

  script:
    - rustc --version && cargo --version
    - cargo build --workspace --verbose
  variables:
    SQLX_OFFLINE: 1

test-backend:
  stage: test
  image: "rust:latest"

  services:
    - postgres:latest
  script:
    - rustc --version && cargo --version
    - cargo test --workspace --verbose
  variables:
    SQLX_OFFLINE: 1
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: admin
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: postgresql://postgres:admin@postgres:5432/postgres

deploy-backend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - buildah push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

changelog:
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone # clone entire repo instead of reusing workspace
    GIT_DEPTH: 0 # avoid shallow clone to give cliff all the info it needs
  stage: deploy
  script:
    - git-cliff -r . > CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG
